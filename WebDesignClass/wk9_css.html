<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>스타일을 가진 웹 페이지</title>
    <style>
        /* CSS 스타일 시트 작성 */
        body {
            background-color: mistyrose;
        }

        /* 바디의 배경색은 위의 색상으로해라 */

        h3 {
            color: purple;
        }

        /* h3의 색상을 위의 색상으로해라 */
        hr {
            border: 5px solid yellowgreen;
        }

        /* 경계는 5픽셀의 솔리드로 위 색상으로 */
        span {
            color: blue;
            font-size: 20px;
        }

        /* 스판속성은 폰트사이즈와 색상을 위와 같이해라 */
    </style>
</head>

<body>
    <h3>CSS 스타일 맛보기</h3>
    <hr>
    <p>나는 <span>웹 프로그래밍</span>을 좋아합니다.</p>
</body>

</html>
