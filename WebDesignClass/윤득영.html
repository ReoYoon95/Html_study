<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="소프트웨어 기술에 관한 설문지">
    <meta name="keywords" content="컴퓨터, 소프트웨어">
    <meta name="robots" content="index,follow">
    <meta name="author" content="Yoon">
    <link href="induk.css" type="text/css" rel="stylesheet">
    <title>소프트웨어 기술 선호에 관한 설문</title>
</head>

<body>
    <header>
        <h1>설문지</h1>
        <article>
            <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
        </article>
    </header>

    <section>
        <form>
            <p><span class="formspan">학년</span>
                <label><input type="radio" name="grade" value="1">1학년</label>
                <label><input type="radio" name="grade" value="2">2학년</label>
                <label><input type="radio" name="grade" value="3">3학년</label>
            </p>

            <p><span class="formspan">성별</span>
                <label><input type="radio" name="grade" value="1">남</label>
                <label><input type="radio" name="grade" value="2">여</label>
            </p>

            <p><span class="formspan">관심분야</span>

                <select size="1">
                    <option value="1">모바일 소프트웨어</option>
                    <option value="2" selected>웹 서비스</option>
                    <option value="3">빅데이터</option>
                    <option value="4">디지털 콘텐츠 및 가상 현실</option>
                </select>

            </p>
            <p><span class="formspan">진로(다중 선택)</span>
                <label>
                    <input type="checkbox" value="1">개발
                </label>
                <label>
                    <input type="checkbox" value="2">기획
                </label>
                <label>
                    <input type="checkbox" value="3">영업
                </label>
                <label>
                    <input type="checkbox" value="4">창업
                </label>
            </p>
            <p><span class="formspan">남기고 싶은 말</span>
                <textarea name="comment" rows="10" cols="60" placeholder="글을 남겨주세요"></textarea>
            </p>
        </form>
    </section>
    <footer>
        <p>Copyright 2026 by Yoon</p>
    </footer>
</body>

</html>
