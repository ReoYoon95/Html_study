<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div> <!-- 메인div<시작> -->
        <h1>직장인을 위한 실무 엑셀(무료 특별판)</h1>
        <div id="책소개"> <!-- 책소개<시작> -->
            <h2>책소개</h2>
            <p>
                <b>현장감 100%</b>, 업무에 <strong>'필요한 것'만 담았다!</strong><br>
                <i>업무</i> 시간은 줄이고 <em>효울은 높인다!</em>
            </p>
        </div><!-- 책소개<끝> -->
        <div id="저자 및 역자소개"><!-- 저자 및 역자소개<시작> -->
            <h2>저자 및 역자소개</h2>
            <p>
                <span style="color: red;">엑셀 분야</span> 전문 프리랜서 강사 - 선양미
            </p>
        </div><!-- 저자 및 역자소개<끝> -->
    </div><!-- 메인div<끝> -->

</body>

</html>
