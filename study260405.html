<!DOCTYPE html>
<html>

<head>
    <title>01제목단란태그</title>
    <meta charset="utf-8">
</head>

<body>
    <!-- 제목단락태그는 h1부터 h6까지 있으며, 숫자가 작을수록 글자가 크다. -->
    <h1>제목단락태그</h1>
    <h2>제목단락태그</h2>
    <h3>제목단락태그</h3>
    <h4>제목단락태그</h4>
    <h5>제목단락태그</h5>
    <h6>제목단락태그</h6>
    <hr />
    <!-- <hr/>수평선 태그입니다. <hr/>태그는 구분선을 긋는 태그입니다. -->

    <p>p태그는<br />단락태그입니다.</p>
    <!-- <p></p>태그는 단락을 나누는 태그이고 스페이스를 몇번을 써도 한번만 적용됌.     <br/>은 줄바꿈 태그입니다. -->

    <div>
        <h1> 윤동주_별 헤는 밤</h1>
        <p>
            별 하나에 추억과<br />
            별 하나에 사랑과<br />
            별 하나에 쓸쓸함과<br />
            별 하나에 동경과<br />
            별 하나에 시와<br />
            별 하나에 어머니,어머니
        </p>
    </div>
    <div>
        <h1>윤동주_또 다른 고향</h1>
        <p>
            고향에 돌아온 날 밤에<br />
            내 백골이 따라와 한방에 누웠다.
        </p>

        <p>
            어둔 방은 우주로 통하고<br />
            하늘에선가 소리처럼 바람이 불어 온다.
        </p>

        <p>
            어둠 속에 곱게 풍화작용하는<br />
            백골을 들여다보며<br />
            눈물짓는 것이 내가 우는 것이냐<br />
            백골이 우는 것이냐<br />
            아름다운 혼이 우는 것이냐
        </p>

    </div>
</body>

</html>
