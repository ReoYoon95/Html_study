<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- 시간 정보 입력 폼 요소
    <input type="month  |   week    |   date    |   time    |   datetime-local"> 이렇게 있다. 
    month는 년/월   week는  년/몇번째주     date는  년/월/일    
    datetime-local은 해당나라의시간 년/월/일/오전오후/시/분/초까지  time은  시/분   이다.-->
    <form>
        <label>
        <i>month</i> : <input type="month" value="2025-03"><br>
        </label>
        <input type="week" value="2025-W09"><br>
        <input type="date" value="2025-03-01"><br>
        <input type="datetime-local" value="2025-03-01T21:30:10.32"><br>    <!-- T는 날짜와 시간을 구분하는 의미.-->
        <input type="time" value="21:30"><br>




    </form>

</body>

</html>
