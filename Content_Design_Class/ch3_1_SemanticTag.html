<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        header {
            width: 100%;
            height: 15%;
            background: yellow;
        }

        nav {
            width: 15%;
            height: 70%;
            float: left;
            background: orange;
        }

        section {
            width: 70%;
            height: 70%;
            float: left;
            background: olivedrab;
        }

        aside {
            width: 15%;
            height: 70%;
            float: left;
            background: orange;
        }

        footer {
            width: 100%;
            height: 15%;
            clear: both;
            background: plum;
        }

        /* Float속성
        - 이미지와 텍스트가 섞여 있을 때 텍스트가 이미지를 중심으로    
        자연스럽게 흘러갈 수 있도록 제공된 CSS기능으로    
         오른쪽, 왼쪽으로 객체를 띄워서 정렬하는 속성 */

        /* 클리어는 사진 주위에 글이 붙지 않게 하는 속성
        즉 float 왼쪽을 한 상태에 영향을 안받겠다 이런느낌.
        clear: none; 설정하지않음
        clear: left or right; 왼쪽 또는 오른쪽 영향받지 않음.
        clear: both; 왼쪽 오른쪽 모두 취소 */
    </style>

</head>

<body>
    <header>해더입니다.</header>
    <nav>네비게이션입니다.</nav>
    <section>섹션입니다</section>
    <aside>어사이드입니다.</aside>
    <footer>풋터입니다.</footer>

</body>

</html>
