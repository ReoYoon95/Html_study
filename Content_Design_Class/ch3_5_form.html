<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form name="fo" method="get">
        <!-- method에서 get방식은 주소창에 내가 입력한 id 비번이 노출됌. post방식은 노출되지 않게 숨겨서 보낸다. -->
        <label for="uid">사용자 ID:</label>
        <!-- 라벨 테그를 이용하여 사용자id를 클릭하기만 해도 입력창이 깜박거리게 연동할 수 있음. 이떄 아이디를 동일하게 해야함.-->
        <input type="text" size="15" id="uid" name="id" value=""><br>
        <label for="upw">비밀 번호:</label>
        <input type="password" size="15" id="upw" name="pw" value="">
        <input type="submit" value="완료">
        <!-- 네임테그를 쓰는 이유는 전송할때 어떤것이 id pw인지 구분할 수 있도록 쓰는것. 
         value 값을 쓰면 창에 value값이 들어가나 빈칸을 선호하기에 비워둔것.현대식으로는 value를 아예 안씀. -->
    </form>

    <form action="save_contact.php" method="post">
        <label for="user_opinion">문의 내용:</label><br>

        <textarea id="user_opinion" name="opinion" rows="10" cols="50"
            placeholder="여기에 문의하실 내용을 상세히 적어주세요.">여기에 입력하면 값이 나옴 value값하고 같음.</textarea>

        <br>
        <input type="submit" value="문의하기">
    </form>
    <!-- placeholder: 아무것도 입력하지 않았을 때 연하게 보이는 안내 문구입니다. 글자를 치기 시작하면 사라집니다. -->

</body>

</html>
