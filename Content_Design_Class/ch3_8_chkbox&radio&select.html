<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>중국집 메뉴 리스트</h1>
    <hr>
    <form>
        <label for="1">짜장면</label>
        <input type="checkbox" id="1" value="1" checked>
        <label for="2">짬봉</label>
        <input type="checkbox" id="2" value="2">
        <label for="3">탕수육</label>
        <input type="checkbox" id="3" value="3">
        <!-- value 값은 폼 요소가 선택된 상태일때 웹서버에 전송되는 값이다.
checked 이 속성이 있으면 초기에 선택 상태로 출력 -->
    </form>
    <hr>
    <form>
        <label> <!-- 이 방법을 더 많이씀 -->
            <input type="radio" name="china" value="1">
            짜장면<img src="media/짜장.jpg" alt="짜장사진"><br>
        </label>

        <input type="radio" id="china2" name="china" value="2">
        <label for="china2">짬뽕<img src="media/짬뽕.jpg" alt="짬뽕사진"></label><br>

        <input type="radio" name="china" value="3">
        탕수육<img src="media/탕수육.jpg" alt="탕수육">
        <!-- 라디오 버튼은 여러선택지중 한가지만 선택해야 할때 사용. 라디오버튼은 이름속성을 동일하게 맞추어 한가지 그룹으로 묶어야함.-->
    </form>
    <hr>
    <form>
        <select name="china" size="1" multiple> <!-- name은 요소이름    사이즈는 보이는 창 갯수 1이 기본값          multiple은 다중선택가능여부-->
            <option value="1">짜장면</option>
            <option value="2" selected>짬뽕</option> <!-- value는 전송되는값이고 selected는 초기에 선택상태로 출력.-->
            <option value="3">탕수육</option>
        </select>
    </form>

</body>


</html>
