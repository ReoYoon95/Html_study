<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <label for="countries">나라:</label>
        <input type="text" id="countries" list="countries"><br>
        <datalist id="countries">
            <option value="가나"></option>
            <option value="스위스"></option>
            <option value="브라질"></option>
        </datalist>

        <!-- input의 리스트와 데이터리스트의 id는 무조건 같게 해야지 작동한다. -->
        보고싶은것 : <input type="text" list="what"><br>
        <datalist id="what">
            <option value="산"></option>
            <option value="바다"></option>
            <option value="도시"></option>
        </datalist>
    </form>
    <!-- 옵션태그는 데이터리스트에서는 닫지 않아도 되지만, 나중에 셀릭트태그를 이용할때는 닫아야 함으로 닫는게 나음. -->

</body>

</html>
