<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <label for="search">검색:</label>
        <input type="text" id="search" size="10" value="">
        <input type="button" value="Q1">
        <button type="button">Q2</button><br>

        <label for="submit">submit 버튼:</label>
        <input type="submit" value="전송1">
        <button type="submit">전송2</button><br>

        <label for="reset">reset 버튼:</label>
        <input type="reset" value="리셋1">
        <button type="reset">리셋2</button><br>

        <label for="image">이미지버튼</label>
        <input type="image" src="media/apple.png" alt="사과버튼">
        <button type="button">
            <img src="media/apple.png" alt="사과버튼2">
        </button>

        <!-- submit(전송버튼) 폼안에 모든데이터를 action에 적인주소로 배달
        reset 클릭하면 입력된 모든 내용을 지우고 기본값으로 되돌림
        button 기능없음. 자바스크립트와 연결해서 클릭하면 팝업창을 띄우는 명령을 내릴때 사용
        image submit 버튼과 똑같이 동작. 다만 버튼 모양이 이미지 일뿐임. -->

    </form>

</body>

</html>
