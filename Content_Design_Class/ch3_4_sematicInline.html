<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인라인 시맨틱 태그</title>
</head>

<body>
    <h3>인라인 시맨틱 태그 사례</h3>
    <hr>
    <p> 내일 <mark>HTML5 시험</mark><br>
        시간은 <time>09:00</time><br>
        난이도 <meter value="0.8" max="1.0"></meter><br> 80%
        테스트용 <meter value="0.9" min="0" max="1.0" low="0.3" high="0.7" optimum="0.5"></meter><br>
        <!-- 로우 하이는 어디까지가 낮고 높은지 정함. 옵티뭄은 적절한 기준값을 정한다. 현재 값이 옵티뭄에서 멀어지면 브라우저가 녹 노 빨 순으로 색을바꿔줌. -->
        자료 업로딩(20%)
        <progress value="20" max="100"></progress><br>
        <!-- 미터는 측정값 고정된 수치나 양을 잴 떄 사용하고, 프로그래스는 진행상태를 나타냄 -->
    </p>

</body>

</html>
